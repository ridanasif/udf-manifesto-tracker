<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000080" />
    <title>Offline | UDF Manifesto Tracker</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        align-items: center;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
        margin: 0 auto;
        max-width: 560px;
        padding: 32px;
      }

      .eyebrow {
        color: #000080;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(1.75rem, 8vw, 2.5rem);
        line-height: 1.1;
        margin: 12px 0;
      }

      p {
        color: #475569;
        font-size: 1rem;
        line-height: 1.7;
        margin: 0 0 24px;
      }

      a {
        align-items: center;
        background: #000080;
        border-radius: 10px;
        color: #ffffff;
        display: inline-flex;
        font-weight: 800;
        min-height: 44px;
        padding: 0 18px;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid rgba(0, 0, 128, 0.35);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Offline Mode</div>
      <h1>Connection paused.</h1>
      <p>
        The tracker is installed, but this page needs the network right now. Reconnect and return to the dashboard to sync the latest public updates.
      </p>
      <a href="/">Back to tracker</a>
    </main>
  </body>
</html>
